<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC Testing & Logging Simulator</title>
    <style>
        :root {
            --primary: #0284c7; /* Sky Blue */
            --bg-color: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #cbd5e1;
            
            --pass-color: #9333ea; /* Purple */
            --fail-color: #facc15; /* Yellow */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            color: var(--text-dark);
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0 0 10px 0;
            color: #0f172a;
        }

        .header p {
            margin: 0;
            color: #64748b;
            font-size: 15px;
        }

        .layout {
            display: flex;
            gap: 30px;
        }

        /* LEFT SIDE: TESTING STATION */
        .testing-station {
            flex: 1;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .station-title {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Animation area */
        .interaction-area {
            height: 250px;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .test-strip {
            width: 30px;
            height: 120px;
            background: white;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            position: absolute;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            transition: transform 1.5s ease-in-out;
            z-index: 2;
        }

        .strip-pad {
            width: 20px;
            height: 20px;
            background: #e2e8f0; /* Default neutral color */
            border: 1px solid #cbd5e1;
            transition: background 0.5s ease;
        }

        .basin {
            width: 180px;
            height: 100px;
            background: rgba(14, 165, 233, 0.2);
            border: 3px solid #94a3b8;
            border-top: none;
            border-radius: 0 0 12px 12px;
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .basin::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: rgba(14, 165, 233, 0.4);
        }
        
        .basin-label {
            color: #0284c7;
            font-weight: bold;
            font-size: 14px;
            opacity: 0.7;
        }

        .btn-dip {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 15px;
            width: 100%;
        }

        .btn-dip:hover { background: #0369a1; }
        .btn-dip:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Reference Chart */
        .color-chart {
            width: 100%;
            background: white;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }
        .chart-title { font-size: 12px; font-weight: bold; text-align: center; margin: 0 0 10px 0; color: #64748b;}
        .chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 14px;}
        .color-box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #ccc; }
        .box-pass { background: var(--pass-color); }
        .box-fail { background: var(--fail-color); }

        /* RIGHT SIDE: LOGBOOK */
        .logbook {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 2px dashed #94a3b8;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #475569;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            background: #f8fafc;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .btn-save {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover { background: #059669; }

        /* Feedback Messages */
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .feedback.success { background: #d1fae5; color: #065f46; border: 1px solid #34d399; display: block;}
        .feedback.error { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; display: block;}

        @media (max-width: 768px) {
            .layout { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>MEC Testing & Documentation Log</h2>
        <p>1. Dip the test strip. 2. Read the color result. 3. Accurately document your findings in the logbook.</p>
    </div>

    <div class="layout">
        <div class="testing-station">
            <h3 class="station-title">🧪 Testing Station</h3>
            
            <div class="interaction-area">
                <div class="test-strip" id="test-strip">
                    <div class="strip-pad" id="strip-pad"></div>
                </div>
                <div class="basin">
                    <span class="basin-label">High-Level Disinfectant</span>
                </div>
            </div>

            <button class="btn-dip" id="btn-dip" onclick="startTest()">1. Dip Test Strip</button>

            <div class="color-chart">
                <p class="chart-title">MEC REFERENCE COLOR CHART</p>
                <div class="chart-row"><div class="color-box box-pass"></div> <strong>PASS:</strong> Solution is safe to use.</div>
                <div class="chart-row"><div class="color-box box-fail"></div> <strong>FAIL:</strong> Solution has fallen below MEC.</div>
            </div>
        </div>

        <div class="logbook">
            <h3 class="station-title">📋 Digital Tracking Log</h3>
            
            <div class="form-group">
                <label>Date & Time</label>
                <input type="text" id="log-date" readonly value="Auto-filled">
            </div>

            <div class="form-group">
                <label>MDRT Initials</label>
                <input type="text" id="log-initials" placeholder="e.g., JD" maxlength="3">
            </div>

            <div class="form-group">
                <label>MEC Strip Result</label>
                <select id="log-result">
                    <option value="">-- Select Result --</option>
                    <option value="pass">PASS (Purple)</option>
                    <option value="fail">FAIL (Yellow)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Required Action</label>
                <select id="log-action">
                    <option value="">-- Select Action --</option>
                    <option value="use">Safe to Process Instruments</option>
                    <option value="discard">Discard Solution Immediately</option>
                </select>
            </div>

            <button class="btn-save" onclick="validateLog()">2. Sign & Save Log</button>

            <div id="feedback-msg" class="feedback" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    let actualResult = null; // Will store 'pass' or 'fail'
    let testInProgress = false;

    // Auto-fill date
    const d = new Date();
    document.getElementById('log-date').value = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    function startTest() {
        if (testInProgress) return;
        testInProgress = true;
        
        // Reset UI
        document.getElementById('feedback-msg').style.display = 'none';
        const strip = document.getElementById('test-strip');
        const pad = document.getElementById('strip-pad');
        const btn = document.getElementById('btn-dip');
        
        pad.style.background = '#e2e8f0'; // Reset color
        btn.disabled = true;
        btn.innerText = "Testing...";

        // Randomly determine pass or fail (50/50 chance)
        actualResult = Math.random() > 0.5 ? 'pass' : 'fail';

        // Animate: Dip down
        strip.style.transform = "translateY(90px)";

        // Wait, change color, come back up
        setTimeout(() => {
            if(actualResult === 'pass') {
                pad.style.background = "var(--pass-color)";
            } else {
                pad.style.background = "var(--fail-color)";
            }
            
            // Bring strip back up
            strip.style.transform = "translateY(0px)";
            
            setTimeout(() => {
                btn.innerText = "Test Complete";
                testInProgress = false;
            }, 1500);

        }, 1500);
    }

    function validateLog() {
        const feedback = document.getElementById('feedback-msg');
        
        // Ensure test was run
        if (!actualResult) {
            showFeedback("error", "You must dip the test strip before filling out the log!");
            return;
        }

        const initials = document.getElementById('log-initials').value.trim();
        const userResult = document.getElementById('log-result').value;
        const userAction = document.getElementById('log-action').value;

        // Validation checks
        if (initials === "" || userResult === "" || userAction === "") {
            showFeedback("error", "Please fill out all fields in the logbook.");
            return;
        }

        if (userResult !== actualResult) {
            showFeedback("error", `Incorrect Result logged! The strip was ${actualResult === 'pass' ? 'Purple (PASS)' : 'Yellow (FAIL)'}. Patient safety is at risk!`);
            return;
        }

        // Check if action matches the result
        if (actualResult === 'pass' && userAction !== 'use') {
            showFeedback("error", "Incorrect Action. If the MEC passes, the solution is safe to use. Don't waste perfectly good chemicals!");
            return;
        }

        if (actualResult === 'fail' && userAction !== 'discard') {
            showFeedback("error", "CRITICAL ERROR: If MEC fails, you MUST discard the solution! Using it will not disinfect the instruments.");
            return;
        }

        // If everything is correct
        showFeedback("success", "✅ Perfect! Your log is accurate. You followed protocol perfectly and maintained patient safety. Click 'Dip Test Strip' to try another batch.");
        
        // Reset for next try
        document.getElementById('btn-dip').disabled = false;
        document.getElementById('btn-dip').innerText = "Test Another Batch";
        actualResult = null; // force them to test again
    }

    function showFeedback(type, message) {
        const feedback = document.getElementById('feedback-msg');
        feedback.className = `feedback ${type}`;
        feedback.innerText = message;
        feedback.style.display = 'block';
    }
</script>

</body>
</html>
