<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrument Damage Detective</title>
    <style>
        :root {
            --primary: #0284c7;
            --success: #10b981;
            --error: #ef4444;
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            background: transparent; color: var(--text-dark);
        }

        .container {
            max-width: 800px; width: 100%;
            background: white; border-radius: 12px;
            padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color); text-align: center;
            box-sizing: border-box;
        }

        h2 { margin: 0 0 10px 0; font-size: 24px; color: #0f172a; }
        p.desc { color: #64748b; margin-bottom: 25px; font-size: 15px; }

        /* Case Files Grid */
        .case-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            margin-bottom: 30px;
        }

        .case-card {
            background: var(--bg-light); border: 2px solid var(--border-color);
            border-radius: 8px; padding: 20px 10px; cursor: pointer;
            transition: all 0.2s; font-weight: bold; font-size: 16px; color: var(--primary);
        }
        .case-card:hover { background: #f0f9ff; border-color: var(--primary); transform: translateY(-3px); }
        .case-card.active { background: var(--primary); color: white; border-color: var(--primary); }
        .case-card.solved { background: #d1fae5; color: #065f46; border-color: var(--success); pointer-events: none;}

        /* Investigation Area */
        .investigation-area {
            display: none; background: white; border: 2px solid var(--border-color);
            border-radius: 10px; padding: 25px; text-align: left;
            animation: fadeIn 0.3s ease;
        }

        .visual-clue {
            background: #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px;
            font-size: 18px; font-weight: bold; text-align: center; color: #334155;
            border: 2px dashed #94a3b8;
        }

        .question { font-size: 18px; margin-bottom: 15px; font-weight: bold; color: #0f172a;}
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn-option {
            background: var(--bg-light); border: 1px solid var(--border-color);
            padding: 12px 20px; text-align: left; border-radius: 6px;
            font-size: 15px; cursor: pointer; transition: all 0.2s;
        }
        .btn-option:hover:not(:disabled) { background: #e2e8f0; }
        .btn-option:disabled { cursor: not-allowed; opacity: 0.7; }
        .btn-option.correct { background: #d1fae5; border-color: var(--success); color: #065f46; font-weight: bold; }
        .btn-option.wrong { background: #fee2e2; border-color: var(--error); color: #991b1b; text-decoration: line-through; }

        .explanation {
            margin-top: 20px; padding: 15px; border-radius: 6px;
            background: #f0f9ff; border-left: 4px solid var(--primary);
            font-size: 15px; line-height: 1.5; display: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) { .case-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Instrument Damage Detective 🕵️‍♂️</h2>
    <p class="desc">Inspect the visual symptoms on the instruments below and determine the root cause of the damage.</p>

    <div class="case-grid">
        <div class="case-card" id="card-1" onclick="openCase(1)">Case File 01:<br>The White Spots</div>
        <div class="case-card" id="card-2" onclick="openCase(2)">Case File 02:<br>The Black Streaks</div>
        <div class="case-card" id="card-3" onclick="openCase(3)">Case File 03:<br>The Deep Holes</div>
    </div>

    <div class="investigation-area" id="investigation-area">
        <div class="visual-clue" id="visual-clue">Visual Clue</div>
        <div class="question" id="question">What caused this?</div>
        <div class="options" id="options"></div>
        <div class="explanation" id="explanation"></div>
    </div>
</div>

<script>
    const cases = {
        1: {
            clue: "🔍 Visual Symptom: A dull, cloudy film with chalky white spots entirely covering a stainless steel retractor.",
            question: "What is the most likely cause of this residue?",
            options: [
                { text: "A) Galvanic corrosion from mixing metals.", correct: false },
                { text: "B) Hard water mineral deposits due to using tap water for the final rinse.", correct: true },
                { text: "C) Exposure to highly acidic chlorides.", correct: false }
            ],
            explanation: "<strong>Correct! (Hard Water Minerals)</strong> Municipal tap water contains calcium and magnesium. If used for the final rinse, the water evaporates in the dryer and leaves these hard minerals behind, causing scaling and spotting. Always use DI or RO water for final rinsing."
        },
        2: {
            clue: "🔍 Visual Symptom: A shiny stainless steel scissor has severe black streaks and plating flaking off, found in the same wash tray as an aluminum container.",
            question: "What is the most likely cause of this damage?",
            options: [
                { text: "A) Mixing incompatible metal types in the same wash cycle.", correct: true },
                { text: "B) Inadequate drying time leading to wet packs.", correct: false },
                { text: "C) Iron originating from the hospital's water pipes.", correct: false }
            ],
            explanation: "<strong>Correct! (Mixed Metals / Galvanic Corrosion)</strong> When different metals (like aluminum and stainless steel) are processed together in the presence of heat and chemicals, a reaction occurs that strips ions from the metals, causing severe black staining and corrosion."
        },
        3: {
            clue: "🔍 Visual Symptom: A surgical clamp has small, deep, blackened holes eaten directly into the metal near the box lock.",
            question: "What is the most likely cause of this structural damage?",
            options: [
                { text: "A) Hard water scaling.", correct: false },
                { text: "B) Leftover enzymatic detergent.", correct: false },
                { text: "C) Pitting corrosion caused by exposure to chlorides (like saline or harsh chemicals).", correct: true }
            ],
            explanation: "<strong>Correct! (Chloride Pitting)</strong> Chlorides (found in saline solutions and some harsh cleaners) are highly corrosive to stainless steel. They eat through the protective passivation layer, creating deep pits that ruin the instrument and create hiding spots for dangerous bacteria. Never soak instruments in saline!"
        }
    };

    function openCase(caseId) {
        // Reset UI
        document.querySelectorAll('.case-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${caseId}`).classList.add('active');
        
        const area = document.getElementById('investigation-area');
        area.style.display = 'block';
        
        const data = cases[caseId];
        document.getElementById('visual-clue').innerText = data.clue;
        document.getElementById('question').innerText = data.question;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        document.getElementById('explanation').style.display = 'none';

        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt.text;
            btn.onclick = () => handleGuess(btn, opt.correct, data.explanation, caseId);
            optionsDiv.appendChild(btn);
        });
    }

    function handleGuess(btn, isCorrect, explanationText, caseId) {
        // Disable all buttons
        const allBtns = document.querySelectorAll('.btn-option');
        allBtns.forEach(b => b.disabled = true);

        if (isCorrect) {
            btn.classList.add('correct');
            document.getElementById(`card-${caseId}`).classList.add('solved');
            document.getElementById(`card-${caseId}`).innerText += " ✓";
        } else {
            btn.classList.add('wrong');
            // Highlight the correct one
            allBtns.forEach(b => {
                if (cases[caseId].options.find(o => o.text === b.innerText).correct) {
                    b.classList.add('correct');
                }
            });
        }

        const explanation = document.getElementById('explanation');
        explanation.innerHTML = explanationText;
        explanation.style.display = 'block';
    }
</script>

</body>
</html>
