<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultrasonic Cavitation Simulator</title>
<style>
    :root {
        --mdrt-navy: #002B49;
        --mdrt-blue: #005A9C;
        --mdrt-sky: #E3F2FD;
        --mdrt-slate: #455A64;
        --mdrt-charcoal: #263238;
        --mdrt-border: #CFD8DC;
        --bubble-color: rgba(129, 212, 250, 0.6);
        --bubble-border: #29B6F6;
        --shock-wave: #FF5252;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 10px;
        background-color: #FFFFFF;
        color: var(--mdrt-charcoal);
        -webkit-user-select: none;
        user-select: none;
    }

    .cavitation-app-wrapper {
        max-width: 100%;
        margin: 0 auto;
        border: 2px solid var(--mdrt-border);
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        overflow: hidden;
        background: #FFFFFF;
        position: relative;
    }

    /* App Header Simulation Banner */
    .app-header {
        background: var(--mdrt-navy);
        color: #FFFFFF;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 4px solid var(--mdrt-blue);
    }

    .app-header h2 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .frequency-badge {
        background: var(--mdrt-blue);
        font-size: 0.8rem;
        font-weight: bold;
        padding: 4px 12px;
        border-radius: 4px;
        font-family: monospace;
    }

    /* Main Split Presentation Grid */
    .app-layout-grid {
        display: grid;
        grid-template-columns: 1fr;
        background: #ECEFF1;
    }

    @media (min-width: 768px) {
        .app-layout-grid {
            grid-template-columns: 1fr 380px;
        }
    }

    /* Left Panel: Fluid Dynamic Animation Window */
    .fluid-tank-viewport {
        background: linear-gradient(180deg, #E0F7FA 0%, #80DEEA 100%);
        padding: 25px;
        height: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--mdrt-border);
        position: relative;
        overflow: hidden;
    }

    .tank-inner-wall-frame {
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* CSS Drawn Surgical Instrument Steel Base Layer */
    .steel-instrument-surface {
        position: absolute;
        bottom: 10px;
        left: 10%;
        right: 10%;
        height: 16px;
        background: linear-gradient(180deg, #B0BEC5 0%, #37474F 100%);
        border-radius: 2px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        z-index: 2;
    }

    .soil-debris-fleck {
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 10px;
        background: #5D4037;
        border-radius: 40% 60% 50% 40%;
        z-index: 3;
        transition: transform 0.4s ease, opacity 0.4s ease;
    }

    /* Dynamic Oscillating Sound Wave Graphic Overlays */
    .acoustic-wave-line {
        position: absolute;
        width: 100%;
        height: 4px;
        background: rgba(255,255,255,0.4);
        opacity: 0;
        pointer-events: none;
        z-index: 1;
    }

    /* Core Microscopic Cavitation Bubble Engine */
    .cavitation-bubble-core {
        width: 10px;
        height: 10px;
        background: var(--bubble-color);
        border: 2px solid var(--bubble-border);
        border-radius: 50%;
        position: absolute;
        bottom: 30px;
        z-index: 10;
        transition: width 0.3s ease, height 0.3s ease, background-color 0.15s ease, border-color 0.15s ease;
        box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Implosion Visual Exploding Ring Layer */
    .shockwave-blast-ring {
        position: absolute;
        border: 4px solid var(--shock-wave);
        border-radius: 50%;
        width: 0px;
        height: 0px;
        opacity: 0;
        z-index: 9;
        pointer-events: none;
    }

    /* Right Panel: Step Controls & EAL Text Scaffolding Boxes */
    .controls-side-dashboard {
        background: #FFFFFF;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 15px;
    }

    .text-scaffold-card {
        background: var(--mdrt-sky);
        border-left: 5px solid var(--mdrt-blue);
        border-radius: 4px;
        padding: 15px;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .text-scaffold-card h4 {
        margin: 0 0 6px 0;
        color: var(--mdrt-navy);
        font-size: 1.05rem;
    }

    .text-scaffold-card p {
        margin: 0;
        font-size: 0.92rem;
        line-height: 1.4;
        color: #1A237E;
    }

    .step-navigation-bar {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .nav-btn {
        flex: 1;
        padding: 12px;
        background-color: var(--mdrt-blue);
        color: #FFFFFF;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s ease;
        text-transform: uppercase;
    }

    .nav-btn:hover:not(:disabled) { background-color: var(--mdrt-navy); }
    .nav-btn:disabled {
        background-color: #B0BEC5;
        color: #78909C;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<div class="cavitation-app-wrapper">
    <header class="app-header">
        <h2>Ultrasonic Cavitation Mechanism Simulator</h2>
        <span class="frequency-badge">Tank Frequency: 40 kHz</span>
    </header>

    <div class="app-layout-grid">
        <section class="fluid-tank-viewport">
            <div class="tank-inner-wall-frame">
                <div class="acoustic-wave-line" id="wave-top" style="top: 20%;"></div>
                <div class="acoustic-wave-line" id="wave-mid" style="top: 50%;"></div>
                
                <div class="shockwave-blast-ring" id="blast-ring"></div>
                
                <div class="cavitation-bubble-core" id="micro-bubble"></div>

                <div class="steel-instrument-surface">
                    <div class="soil-debris-fleck" id="soil-fleck"></div>
                </div>
            </div>
        </section>

        <section class="controls-side-dashboard">
            <div class="text-scaffold-card" id="description-card-target">
                <h4>1. High-Frequency Acoustic Waves</h4>
                <p>The ultrasonic machine generator turns electrical energy into sound waves. These sound waves push straight down into the water wash tank at 40,000 vibrations every second.</p>
            </div>

            <div class="step-navigation-bar">
                <button class="nav-btn" id="btn-prev" onclick="advanceCavitationWorkflow(-1)" disabled>◀ Prev Phase</button>
                <button class="nav-btn" id="btn-next" onclick="advanceCavitationWorkflow(1)">Next Phase ▶</button>
            </div>
        </section>
    </div>
</div>

<script>
    // Local data matrix isolating structural animation parameters and word definitions
    const cavitationPhases = [
        {
            step: 1,
            title: "1. High-Frequency Acoustic Waves",
            text: "The ultrasonic cleaning tank generator creates high-frequency sound waves. These acoustic waves pass continually through the fluid solution, creating areas of high and low pressure.",
            bubbleSize: "12px",
            bubbleOpacity: "0.5",
            waveOpacity: "0.4",
            soilOpacity: "1",
            soilScale: "1",
            bgColor: "",
            borderColor: "",
            showBlast: false
        },
        {
            step: 2,
            title: "2. Low-Pressure Expansion (Rarefaction)",
            text: "When the sound wave creates a low-pressure area (called <strong>rarefaction</strong>), it literally pulls the fluid apart. This mechanical pulling force creates a microscopic vacuum bubble inside the water wash solution.",
            bubbleSize: "35px",
            bubbleOpacity: "0.7",
            waveOpacity: "0.1",
            soilOpacity: "1",
            soilScale: "1",
            bgColor: "rgba(179, 229, 252, 0.4)",
            borderColor: "#4FC3F7",
            showBlast: false
        },
        {
            step: 3,
            title: "3. Maximum Bubble Growth",
            text: "As sound vibrations continue to pump energy into the water, the micro-bubble absorbs the power and expands dramatically. The inner vacuum pressure drops as the bubble expands to its maximum physical size limit.",
            bubbleSize: "75px",
            bubbleOpacity: "0.8",
            waveOpacity: "0.2",
            soilOpacity: "1",
            soilScale: "1",
            bgColor: "rgba(129, 212, 250, 0.3)",
            borderColor: "#29B6F6",
            showBlast: false
        },
        {
            step: 4,
            title: "4. Violent Implosion (Collapse)",
            text: "The surrounding water pressure overpowers the giant vacuum bubble, causing it to violently <strong>implode</strong> (burst inward). This collapse generates extreme heat and micro-jets of fluid moving at hundreds of kilometers per hour.",
            bubbleSize: "0px",
            bubbleOpacity: "0",
            waveOpacity: "0",
            soilOpacity: "0.2",
            soilScale: "0.4",
            bgColor: "transparent",
            borderColor: "transparent",
            showBlast: true
        },
        {
            step: 5,
            title: "5. Mechanical Soil Removal",
            text: "The power from the implosion shockwave blasts against the surgical tool. These microscopic shockwaves scrub the steel, stripping away hardened blood, bioburden, and bone lipids from hard-to-reach box locks and crevices.",
            bubbleSize: "8px",
            bubbleOpacity: "0.4",
            waveOpacity: "0.3",
            soilOpacity: "0",
            soilScale: "0",
            bgColor: "",
            borderColor: "",
            showBlast: false
        }
    ];

    let currentActivePhaseIndex = 0;

    const bubbleNode = document.getElementById("micro-bubble");
    const topWaveNode = document.getElementById("wave-top");
    const midWaveNode = document.getElementById("wave-mid");
    const blastRingNode = document.getElementById("blast-ring");
    const soilFleckNode = document.getElementById("soil-fleck");
    const textCardNode = document.getElementById("description-card-target");

    function advanceCavitationWorkflow(direction) {
        currentActivePhaseIndex = Math.max(0, Math.min(cavitationPhases.length - 1, currentActivePhaseIndex + direction));
        renderActiveCavitationState();
    }

    function renderActiveCavitationState() {
        const config = cavitationPhases[currentActivePhaseIndex];

        // Process bubble component physical size transforms smoothly
        bubbleNode.style.width = config.bubbleSize;
        bubbleNode.style.height = config.bubbleSize;
        bubbleNode.style.opacity = config.bubbleOpacity;
        
        if (config.bgColor) {
            bubbleNode.style.backgroundColor = config.bgColor;
            bubbleNode.style.borderColor = config.borderColor;
        } else {
            bubbleNode.style.backgroundColor = "rgba(129, 212, 250, 0.6)";
            bubbleNode.style.borderColor = "#29B6F6";
        }

        // Animate acoustic wave lines indicator visibility states
        topWaveNode.style.opacity = config.waveOpacity;
        midWaveNode.style.opacity = config.waveOpacity;

        // Manage active soil particle degradation animation profiles
        soilFleckNode.style.opacity = config.soilOpacity;
        soilFleckNode.style.transform = `translateX(-50%) scale(${config.soilScale})`;

        // Evaluate blast ring explosion vectors
        if (config.showBlast) {
            blastRingNode.style.width = "120px";
            blastRingNode.style.height = "120px";
            blastRingNode.style.opacity = "1";
            blastRingNode.style.transition = "all 0.4s cubic-bezier(0.1, 0.8, 0.3, 1)";
        } else {
            blastRingNode.style.width = "0px";
            blastRingNode.style.height = "0px";
            blastRingNode.style.opacity = "0";
            blastRingNode.style.transition = "none";
        }

        // Hydrate descriptive textual content cards
        textCardNode.innerHTML = `
            <h4>${config.title}</h4>
            <p>${config.text}</p>
        `;

        // Establish button lock boundaries constraints
        document.getElementById("btn-prev").disabled = (currentActivePhaseIndex === 0);
        document.getElementById("btn-next").disabled = (currentActivePhaseIndex === cavitationPhases.length - 1);
    }

    // Bind document initializing listener hook
    window.addEventListener("DOMContentLoaded", () => {
        renderActiveCavitationState();
    });
</script>

</body>
</html>
