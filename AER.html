<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AER Reprocessing Simulator</title>
    <style>
        :root {
            --primary: #0284c7;
            --step-inactive: #e2e8f0;
            --step-active: #0ea5e9;
            --step-done: #059669;
            --text-dark: #1e293b;
        }

        body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; border: 1px solid #cbd5e1; }
        
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .step { width: 18%; height: 8px; background: var(--step-inactive); border-radius: 4px; }
        .step.active { background: var(--step-active); }
        .step.done { background: var(--step-done); }

        .scenario-box { padding: 20px; background: #f1f5f9; border-radius: 8px; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { opacity: 0.9; }
        .correct { background: var(--step-done); color: white; }
        .wrong { background: var(--error); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>AER Flexible Endoscope Workflow</h2>
    <div class="progress-bar" id="progress-bar">
        <div class="step" id="s0"></div>
        <div class="step" id="s1"></div>
        <div class="step" id="s2"></div>
        <div class="step" id="s3"></div>
        <div class="step" id="s4"></div>
    </div>
    <div id="game-ui">
        <div class="scenario-box" id="scenario">Loading...</div>
        <div id="choices"></div>
    </div>
</div>

<script>
    const workflow = [
        { q: "The scope has arrived at the decontamination sink. What is your first priority?", 
          a: ["Leak test the scope", "Put it in the AER"], correct: 0 },
        { q: "The scope passed the leak test. How do you prepare the internal channels?", 
          a: ["Manual brushing and flushing", "Skip to the AER"], correct: 0 },
        { q: "The scope is clean. You are loading it into the AER. What must you ensure?", 
          a: ["All channels are correctly connected", "Just throw it in"], correct: 0 },
        { q: "The AER cycle is running. What does the machine perform during the cycle?", 
          a: ["High-Level Disinfection", "Steam Sterilization"], correct: 0 },
        { q: "The scope is reprocessed. How do you store it?", 
          a: ["Hang vertically in a clean environment", "Coil it tightly on a shelf"], correct: 0 }
    ];

    let currentStep = 0;

    function render() {
        if(currentStep >= workflow.length) {
            document.getElementById('game-ui').innerHTML = "<h3>✅ Cycle Complete: Endoscope Reprocessed Safely</h3>";
            return;
        }
        
        document.getElementById('scenario').innerText = workflow[currentStep].q;
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        
        workflow[currentStep].a.forEach((opt, i) => {
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === workflow[currentStep].correct) {
                    document.getElementById('s' + currentStep).classList.add('done');
                    currentStep++;
                    render();
                } else {
                    alert("Incorrect - this could damage the scope or lead to infection!");
                }
            };
            choicesDiv.appendChild(btn);
        });
    }
    render();
</script>
</body>
</html>
