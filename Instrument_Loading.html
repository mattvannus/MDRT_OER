<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumentation Handling lab</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --success: #10b981;
            --error: #ef4444;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --border: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
            background: transparent; color: #1e293b;
        }

        .handling-container {
            max-width: 850px; width: 100%;
            background: #ffffff; border: 1px solid var(--border);
            border-radius: 12px; padding: 25px; box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .handling-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;
        }

        .simulation-deck {
            background: #1e293b; border-radius: 10px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; min-height: 300px; color: #ffffff;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .instrument-sprite {
            font-size: 75px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* State Animations */
        .shock-shake { animation: shake 0.4s linear; }
        .open-state { transform: rotate(-15deg); }
        .mask-alert { border: 3px dashed var(--error); border-radius: 50%; padding: 10px; animation: pulse-border 1.5s infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .action-column { display: flex; flex-direction: column; gap: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .group-label { font-weight: bold; font-size: 13px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }

        .lab-btn {
            background: var(--bg-light); border: 2px solid var(--border);
            border-radius: 6px; padding: 12px; text-align: left;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            color: #1e293b;
        }
        .lab-btn:hover { border-color: var(--primary); background: #f0f9ff; }
        .lab-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .console-log {
            margin-top: 20px; padding: 15px; border-radius: 8px;
            background: #f1f5f9; border-left: 4px solid #475569; font-size: 14px; line-height: 1.5;
        }
        .console-log.success { border-left-color: var(--success); background: #f0fdf4; color: #166534; }
        .console-log.error { border-left-color: var(--error); background: #fef2f2; color: #991b1b; }

        .tray-mass-container {
            width: 80%; background: #334155; border: 2px solid #475569; border-radius: 6px;
            height: 20px; margin-top: 15px; position: relative; overflow: hidden;
        }
        .tray-mass-bar { width: 30%; height: 100%; background: var(--success); transition: width 0.3s, background-color 0.3s; }
    </style>
</head>
<body>

<div class="handling-container">
    <div class="handling-grid">
        <!-- Technical Chamber Sandbox Canvas -->
        <div class="handling-grid" style="grid-template-columns: 1fr; margin: 0;">
            <div class="simulation-deck" id="sim-deck">
                <div id="sprite-wrapper" class="instrument-sprite">✂️</div>
                <div class="tray-mass-container">
                    <div class="tray-mass-bar" id="mass-bar"></div>
                </div>
                <div style="margin-top:8px; font-family:monospace; font-size:11px; color:#94a3b8;" id="mass-label">TRAY LOADING DENSITY: OPTIMAL (35%)</div>
            </div>
        </div>

        <!-- Dynamic Control Interfaces -->
        <div class="action-column">
            <div class="control-group">
                <div class="group-label">Handling Mechanics Force Check</div>
                <button class="lab-btn" id="btn-toss" onclick="executeAction('toss')">⚠️ Drop/Toss Instrument into Basin</button>
                <button class="lab-btn" id="btn-place" onclick="executeAction('place')">✅ Place Instrument Gently</button>
            </div>

            <div class="control-group">
                <div class="group-label">Ratchets Configuration Setup</div>
                <button class="lab-btn" id="btn-close" onclick="executeAction('close')">🔒 Lock Hinges &amp; Ratchets Closed</button>
                <button class="lab-btn" id="btn-open" onclick="executeAction('open')">🔓 Open and Place on Stringer</button>
            </div>

            <div class="control-group">
                <div class="group-label">Tray Packaging Configuration</div>
                <button class="lab-btn" id="btn-overload" onclick="executeAction('overload')">📦 Overcrowd Basket / Stacking Arrays</button>
            </div>
        </div>
    </div>

    <div class="console-log" id="console-log">
        <strong>Decontamination Triage Console:</strong> Select handling parameters to monitor alloy changes, kinematic forces, and bioburden clearance paths.
    </div>
</div>

<script>
    let currentHandling = null;
    let currentHinge = 'closed';
    let currentDensity = 'optimal';

    function executeAction(action) {
        const consoleLog = document.getElementById('console-log');
        const deck = document.getElementById('sim-deck');
        const sprite = document.getElementById('sprite-wrapper');
        const bar = document.getElementById('mass-bar');
        const lbl = document.getElementById('mass-label');

        if (action === 'toss') {
            currentHandling = 'shock';
            sprite.className = "instrument-sprite shock-shake";
            consoleLog.className = "console-log error";
            consoleLog.innerHTML = "<strong>❌ IMPACT FATAL EXPOSURE:</strong> Dropping or tossing metals creates contact stress lines. This creates micro-fractures along hinges and throws jaw paths completely out of calibration alignment.";
            setTimeout(() => { sprite.classList.remove('shock-shake'); }, 400);
        } 
        
        else if (action === 'place') {
            currentHandling = 'gentle';
            sprite.className = "instrument-sprite";
            if (currentHinge === 'open') sprite.classList.add('open-state');
            consoleLog.className = "console-log success";
            consoleLog.innerHTML = "<strong>✅ PARAMETER VALIDATED:</strong> Placing components safely prevents mechanical stress lines, safeguards hinge tolerances, and extends tool deployment lifespan.";
        } 
        
        else if (action === 'close') {
            currentHinge = 'closed';
            sprite.className = "instrument-sprite mask-alert";
            consoleLog.className = "console-log error";
            consoleLog.innerHTML = "<strong>❌ WATER MASKING INCIDENT:</strong> Closing jaws hides internal box-lock surfaces from fluid contact paths. Detergent cannot reach the inner hinge faces, leaving blood and bioburden trapped underneath.";
        } 
        
        else if (action === 'open') {
            currentHinge = 'open';
            sprite.className = "instrument-sprite open-state";
            consoleLog.className = "console-log success";
            consoleLog.innerHTML = "<strong>✅ SHADOW BOUNDARY DEACTIVATED:</strong> Threading fully open hinges on wire stringers exposes 100% of internal box-locks to water spray and bioburden displacement loops.";
        } 
        
        else if (action === 'overload') {
            currentDensity = 'critical';
            bar.style.width = "100%";
            bar.style.backgroundColor = "var(--error)";
            lbl.innerText = "TRAY LOADING DENSITY: CRITICAL OVERLOAD (95%)";
            consoleLog.className = "console-log error";
            consoleLog.innerHTML = "<strong>❌ PROCESS ERROR: Hydraulic Shadowing.</strong> Stacking instruments stops water spray velocity from reaching inner layers. Water cannot reach covered tools, leaving bioburden residue trapped inside. Load rejected.";
        }
    }
</script>

</body>
</html>
